<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html { overflow-x: hidden; }
    </style>
    <script>
        // Scale page up on 4K, down on small screens
        function applyPageZoom() {
            var vw = window.screen.width; // use screen width, not window
            var zoom = 1;
            if (vw >= 1921) {
                zoom = vw / 1920;
            } else if (vw < 1170) {
                zoom = vw / 1170;
            }
            document.documentElement.style.zoom = zoom;
        }
        applyPageZoom();
        window.addEventListener('resize', applyPageZoom);
    </script>
    <title>BNL — Battle Newbie League | Warcraft 3</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link href="https://fonts.googleapis.com/css?family=PT+Sans:400,700&subset=cyrillic" rel="stylesheet">
    <!-- WoW template styles first, then BNL overrides -->
    <link rel="stylesheet" href="/styles/wow-style.css">
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>

<div class="top-bg">
<div class="bottom-bg">
    <div class="wrapper">

        <!-- ── Header ──────────────────────────────────────────────────────── -->
        <header class="header">

            <!-- Language switcher -->
            <div class="countries-lang">
                <a href="" id="lang-ru" class="active" onclick="switchLang('ru'); return false;">
                    <img src="/images/wow/rus-icon.png" alt="Ru">
                </a>
                <a href="" id="lang-en" onclick="switchLang('en'); return false;">
                    <img src="/images/wow/eng-icon.png" alt="En">
                </a>
            </div>

            <!-- Social links -->
            <div class="soc-block">
                <a href="" target="_blank"><img src="/images/wow/youtube-icon.png" alt="YouTube"></a>
                <a href="" target="_blank"><img src="/images/wow/facebook-icon.png" alt="Facebook"></a>
                <a href="" target="_blank"><img src="/images/wow/twitter-icon.png" alt="Twitter"></a>
            </div>

            <!-- Navigation -->
            <div class="menu">
                <div class="login">
                    <a href="#profile" onclick="navigate('profile')">Войти</a>
                </div>
                <ul id="bnl-nav">
                    <li><a href="#home"      onclick="navigate('home');      return false;">Главная</a></li>
                    <li><a href="#standings" onclick="navigate('standings'); return false;">Таблица</a></li>
                    <li><a href="#teams"     onclick="navigate('teams');     return false;">Команды</a></li>
                    <li><a href="#clanwar"   onclick="navigate('clanwar');   return false;">Клан-вары</a></li>
                    <li><a href="#profile"   onclick="navigate('profile');   return false;">Профиль</a></li>
                    <li><a href="#admin"     onclick="navigate('admin');     return false;">Админ</a></li>
                </ul>
            </div>

            <!-- Logo -->
            <div class="logo">
                <a href="#profile" onclick="navigate('profile'); return false;"></a>
                <p>BNL LEAGUE</p>
            </div>

            <!-- Players online counter -->
            <div class="online-block">
                <p>PLAYERS ONLINE</p>
                <span id="player-count">—</span>
                <div class="progress-button"></div>
                <div class="progress-bar">
                    <img id="progress-bar-fill" style="width: 50%;" src="/images/wow/progress-bar.png">
                </div>
            </div>

        </header><!-- .header -->

        <!-- ── Content (React app mounts here) ─────────────────────────────── -->
        <div class="container">
            <main class="content">
                <div class="start-game">
                    <a href="#home">
                        <span id="start-game-title">Как работает лига</span><br>
                        <span id="start-game-sub">Сезон 2 стартует 3 мая 2026</span>
                    </a>
                </div>
                <div id="bnl-content">
                    <div id="root"></div>
                </div>
            </main>
        </div>

        <!-- ── Footer ──────────────────────────────────────────────────────── -->
        <footer class="footer">
            <div class="footer-img">
                <span></span>
            </div>
            <div class="footer-menu">
                <div class="footer-logo">
                    <a href="#home" onclick="navigate('home'); return false;"></a>
                </div>
                <ul>
                    <li><a href="#home"      onclick="navigate('home');      return false;">Главная</a></li>
                    <li><a href="#standings" onclick="navigate('standings'); return false;">Таблица</a></li>
                    <li><a href="#teams"     onclick="navigate('teams');     return false;">Команды</a></li>
                    <li><a href="#clanwar"   onclick="navigate('clanwar');   return false;">Клан-вары</a></li>
                    <li><a href="#profile"   onclick="navigate('profile');   return false;">Профиль</a></li>
                </ul>
            </div>
            <div class="copy">
                <div class="copyright">
                    © 2024 BNL — Battle Newbie League<br>Warcraft III Reforged
                </div>
                <div class="paymant">
                    <img src="/images/wow/paymant-bg.png" alt="">
                </div>
            </div>
        </footer>

    </div><!-- .wrapper -->
</div><!-- .bottom-bg -->
</div><!-- .top-bg -->

<!-- ── Scripts ───────────────────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script src="/i18n.js"></script>
<script type="text/babel" src="/components/Standings.js"></script>
<script type="text/babel" src="/components/Teams.js"></script>
<script type="text/babel" src="/components/ClanWar.js"></script>
<script type="text/babel" src="/components/Profile.js"></script>
<script type="text/babel" src="/components/Admin.js"></script>
<script type="text/babel" src="/components/Draft.js"></script>
<script type="text/babel" src="/components/Portraits.js"></script>
<script type="text/babel" src="/app.js"></script>

<script>
    // ── Navigation labels (RU / EN) ───────────────────────────────────────
    var NAV_LABELS = {
        ru: { home: 'Главная', standings: 'Рейтинг', teams: 'Команды', clanwar: 'Клан-вары', profile: 'Профиль', admin: 'Админ' },
        en: { home: 'Home', standings: 'Standings', teams: 'Teams', clanwar: 'Clan Wars', profile: 'Profile', admin: 'Admin' }
    };

    function updateNavText(lang) {
        var labels = NAV_LABELS[lang] || NAV_LABELS['ru'];
        document.querySelectorAll('#bnl-nav a').forEach(function(a) {
            var tab = a.getAttribute('href').replace('#', '');
            if (labels[tab]) a.textContent = labels[tab];
        });
        var loginLink = document.querySelector('.login a');
        if (loginLink) loginLink.textContent = lang === 'en' ? 'Login' : 'Войти';
        var sgTitle = document.getElementById('start-game-title');
        var sgSub = document.getElementById('start-game-sub');
        if (sgTitle) sgTitle.textContent = lang === 'en' ? 'How the League Works' : 'Как работает лига';
        if (sgSub) sgSub.textContent = lang === 'en' ? 'Season 2 starts May 3, 2026' : 'Сезон 2 стартует 3 мая 2026';
    }

    // ── Players online label i18n ────────────────────────────────────────
    function updateOnlineLabel(lang) {
        var p = document.querySelector('.online-block > p');
        if (p) p.textContent = 'PLAYERS ONLINE';
    }

    // ── Navigation helper (sync hash + highlight) ─────────────────────────
    function navigate(tab) {
        window.location.hash = tab;
    }

    function updateNavHighlight() {
        var hash = window.location.hash.replace('#', '') || 'home';
        var links = document.querySelectorAll('#bnl-nav a');
        links.forEach(function(a) {
            var aTab = a.getAttribute('href').replace('#', '');
            if (aTab === hash) {
                a.classList.add('nav-active');
            } else {
                a.classList.remove('nav-active');
            }
        });
        // Show start-game only on home page
        var sg = document.querySelector('.start-game');
        if (sg) sg.style.display = (hash === 'home' || hash === '') ? 'block' : 'none';
    }

    window.addEventListener('hashchange', updateNavHighlight);
    updateNavHighlight();

    // ── Language switcher ─────────────────────────────────────────────────
    function switchLang(lang) {
        if (typeof setLang === 'function') setLang(lang);
        document.getElementById('lang-ru').className = lang === 'ru' ? 'active' : '';
        document.getElementById('lang-en').className = lang === 'en' ? 'active' : '';
        updateNavText(lang);
    }

    // Apply stored language on page load
    (function() {
        var storedLang = localStorage.getItem('bnl_lang') || 'ru';
        updateNavText(storedLang);
        document.getElementById('lang-ru').className = storedLang === 'ru' ? 'active' : '';
        document.getElementById('lang-en').className = storedLang === 'en' ? 'active' : '';
    })();

    // ── Player count from API ─────────────────────────────────────────────
    function loadPlayerCount() {
        fetch('/api/players')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var count = Array.isArray(data) ? data.length : 0;
                document.getElementById('player-count').textContent = count;
                // Scale progress bar width based on count (max ~50 players = 100%)
                var pct = Math.min(count / 50 * 100, 100);
                var bar = document.getElementById('progress-bar-fill');
                if (bar) bar.style.width = pct + '%';
            })
            .catch(function() {});
    }
    loadPlayerCount();
</script>

</body>
</html>
