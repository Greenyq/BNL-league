<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html { overflow-x: hidden; }
    </style>
    <script>
        // Keep mobile at native scale, but enlarge the fixed-width desktop
        // layout on wide screens similarly to the deployed site.
        function applyPageZoom() {
            var layoutWidth = 1170;
            var viewportWidth = window.innerWidth;
            var screenWidth = window.screen.width;
            var zoom = 1;

            if (viewportWidth >= layoutWidth && screenWidth >= 1921) {
                zoom = Math.min(screenWidth / 1920, viewportWidth / layoutWidth);
            }

            document.documentElement.style.zoom = zoom;
        }
        applyPageZoom();
        window.addEventListener('load', applyPageZoom);
        window.addEventListener('resize', applyPageZoom);
        window.addEventListener('orientationchange', applyPageZoom);
    </script>
    <title>BNL — Battle Newbie League | Warcraft 3</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link href="https://fonts.googleapis.com/css?family=PT+Sans:400,700&subset=cyrillic" rel="stylesheet">
    <!-- WoW template styles first, then BNL overrides -->
    <link rel="stylesheet" href="/styles/wow-style.css">
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>

<div class="top-bg">
    <div class="wrapper">

        <!-- ── Header ──────────────────────────────────────────────────────── -->
        <header class="header">

            <div id="header-top-row" class="header-top-row">
                <button
                    id="header-menu-toggle"
                    class="header-menu-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-controls="header-top-row"
                    aria-label="Toggle navigation menu"
                    onclick="toggleHeaderMenu(); return false;"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <!-- Social links -->
                <div class="soc-block">
                    <a href="https://discord.gg/XCj2GTgAt2" target="_blank" rel="noopener noreferrer" aria-label="Discord">
                        <img src="/images/discord_logo.png" alt="Discord">
                    </a>
                </div>

                <!-- Navigation -->
                <div class="menu">
                    <ul id="bnl-nav">
                        <li><a href="#home"      onclick="navigate('home');      return false;">Главная</a></li>
                        <li><a href="#standings" onclick="navigate('standings'); return false;">Таблица</a></li>
                        <li><a href="#teams"     onclick="navigate('teams');     return false;">Команды</a></li>
                        <li><a href="#clanwar"   onclick="navigate('clanwar');   return false;">Клан-вары</a></li>
                        <li><a id="header-profile-link" href="#profile" onclick="navigate('profile'); return false;">Профиль</a></li>
                    </ul>
                </div>

                <!-- Language switcher -->
                <div class="countries-lang">
                    <a href="" id="lang-ru" class="active" onclick="switchLang('ru'); return false;">
                        <img src="/images/wow/rus-icon.png" alt="Ru">
                    </a>
                    <a href="" id="lang-en" onclick="switchLang('en'); return false;">
                        <img src="/images/wow/eng-icon.png" alt="En">
                    </a>
                </div>
            </div>

            <!-- Logo -->
            <div class="logo">
                <a href="#profile" onclick="navigate('profile'); return false;"></a>
                <p>
                    BNL LEAGUE
                    <span id="start-game-sub" class="logo-season-status">Сезон 2 стартует <strong class="logo-season-date">3 мая 2026</strong></span>
                </p>
            </div>

            <!-- Season progress counter -->
            <div class="online-block">
                <p>SEASON PROGRESS</p>
                <span id="player-count">—</span>
                <div class="progress-bar" aria-hidden="true">
                    <div class="progress-bar__glow"></div>
                    <div class="progress-bar__endcap progress-bar__endcap--left"></div>
                    <div class="progress-bar__track">
                        <div id="progress-bar-fill" class="progress-bar__fill" style="width: 50%;"></div>
                    </div>
                    <div class="progress-bar__endcap progress-bar__endcap--right"></div>
                </div>
            </div>

        </header><!-- .header -->

        <!-- ── Content (React app mounts here) ─────────────────────────────── -->
        <div class="container">
            <div id="wow-section-title-slot" class="container-title-slot"></div>
            <main class="content">
                <div id="bnl-content">
                    <div id="root"></div>
                </div>
            </main>
        </div>
    </div><!-- .wrapper -->
</div><!-- .top-bg -->

<div class="bottom-scene">
    <div class="wrapper">
        <!-- ── Footer ──────────────────────────────────────────────────────── -->
        <footer class="footer">
            <div class="footer-img">
                <span></span>
            </div>
            <div class="footer-menu">
                <div class="footer-logo">
                    <a href="#home" onclick="navigate('home'); return false;"></a>
                </div>
                <ul id="footer-nav">
                    <li><a href="#home"      onclick="navigate('home');      return false;">Главная</a></li>
                    <li><a href="#standings" onclick="navigate('standings'); return false;">Таблица</a></li>
                    <li><a href="#teams"     onclick="navigate('teams');     return false;">Команды</a></li>
                    <li><a href="#clanwar"   onclick="navigate('clanwar');   return false;">Клан-вары</a></li>
                    <li><a href="#profile"   onclick="navigate('profile');   return false;">Профиль</a></li>
                </ul>
            </div>
            <div class="copy">
                <div class="copyright">
                    © 2024 BNL — Battle Newbie League<br>Warcraft III Reforged
                </div>
                <div class="paymant">
                    <img src="/images/wow/paymant-bg.png" alt="">
                </div>
            </div>
        </footer>
    </div><!-- .wrapper -->
</div><!-- .bottom-scene -->

<!-- ── Scripts ───────────────────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script src="/i18n.js"></script>
<script type="text/babel" src="/components/Standings.js"></script>
<script type="text/babel" src="/components/Teams.js"></script>
<script type="text/babel" src="/components/ClanWar.js"></script>
<script type="text/babel" src="/components/Profile.js"></script>
<script type="text/babel" src="/components/Admin.js"></script>
<script type="text/babel" src="/components/Draft.js"></script>
<script type="text/babel" src="/components/Portraits.js"></script>
<script type="text/babel" src="/app.js"></script>

<script>
    // ── Navigation labels (RU / EN) ───────────────────────────────────────
    var PLAYER_SESSION_KEY = 'bnl_player_session';
    var PLAYER_USERNAME_KEY = 'bnl_player_username';
    var PLAYER_SESSION_EVENT = 'bnl-player-session-change';
    var pendingPlayerUsernameRequest = null;

    var NAV_LABELS = {
        ru: { home: 'Главная', standings: 'Рейтинг', teams: 'Команды', clanwar: 'Клан-вары', profile: 'Профиль', admin: 'Админ' },
        en: { home: 'Home', standings: 'Standings', teams: 'Teams', clanwar: 'Clan Wars', profile: 'Profile', admin: 'Admin' }
    };

    var HEADER_PROGRESS_LABELS = {
        ru: 'ПРОГРЕСС СЕЗОНА',
        en: 'SEASON PROGRESS'
    };

    function isPlayerAuthenticated() {
        return !!localStorage.getItem(PLAYER_SESSION_KEY);
    }

    function getStoredPlayerUsername() {
        return localStorage.getItem(PLAYER_USERNAME_KEY);
    }

    function setStoredPlayerUsername(username) {
        if (username) localStorage.setItem(PLAYER_USERNAME_KEY, username);
        else localStorage.removeItem(PLAYER_USERNAME_KEY);
    }

    function ensurePlayerUsername() {
        var sid = localStorage.getItem(PLAYER_SESSION_KEY);
        if (!sid || !isPlayerAuthenticated()) {
            setStoredPlayerUsername(null);
            return;
        }
        if (getStoredPlayerUsername() || pendingPlayerUsernameRequest) return;

        pendingPlayerUsernameRequest = fetch('/api/players/auth/me', {
            headers: { 'x-player-session-id': sid }
        })
            .then(function(r) {
                return r.json().catch(function() { return {}; }).then(function(data) {
                    if (!r.ok) {
                        var error = data.error || r.statusText;
                        if (r.status === 401 || error === 'Not authenticated' || error === 'User not found') {
                            localStorage.removeItem(PLAYER_SESSION_KEY);
                            setStoredPlayerUsername(null);
                        }
                        throw new Error(error);
                    }
                    return data;
                });
            })
            .then(function(data) {
                setStoredPlayerUsername(data.user && data.user.username ? data.user.username : null);
                updateHeaderProfileLink();
            })
            .catch(function() {
                updateHeaderProfileLink();
            })
            .finally(function() {
                pendingPlayerUsernameRequest = null;
            });
    }

    function updateHeaderProfileLink(lang) {
        var profileLink = document.getElementById('header-profile-link');
        if (!profileLink) return;

        var currentLang = typeof lang === 'string'
            ? lang
            : (localStorage.getItem('bnl_lang') || 'ru');
        var playerUsername = getStoredPlayerUsername();

        if (isPlayerAuthenticated()) {
            profileLink.textContent = playerUsername || (currentLang === 'en' ? 'Profile' : 'Профиль');
            ensurePlayerUsername();
            return;
        }

        profileLink.textContent = currentLang === 'en' ? 'Login' : 'Войти';
    }

    function updateNavText(lang) {
        var labels = NAV_LABELS[lang] || NAV_LABELS['ru'];
        document.querySelectorAll('#bnl-nav a, #footer-nav a').forEach(function(a) {
            var tab = a.getAttribute('href').replace('#', '');
            if (labels[tab]) a.textContent = labels[tab];
        });
        updateHeaderProfileLink(lang);
        updateOnlineLabel(lang);
        var sgSub = document.getElementById('start-game-sub');
        if (sgSub) sgSub.innerHTML = lang === 'en'
            ? 'Season 2 starts <strong class="logo-season-date">May 3, 2026</strong>'
            : 'Сезон 2 стартует <strong class="logo-season-date">3 мая 2026</strong>';
    }

    // ── Season progress label i18n ───────────────────────────────────────
    function updateOnlineLabel(lang) {
        var p = document.querySelector('.online-block > p');
        if (p) p.textContent = HEADER_PROGRESS_LABELS[lang] || HEADER_PROGRESS_LABELS['ru'];
    }

    // ── Navigation helper (sync hash + highlight) ─────────────────────────
    function scrollPageToTop() {
        window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
    }

    function closeHeaderMenu() {
        var row = document.getElementById('header-top-row');
        var toggle = document.getElementById('header-menu-toggle');
        if (row) row.classList.remove('is-open');
        if (toggle) toggle.setAttribute('aria-expanded', 'false');
    }

    function toggleHeaderMenu() {
        var row = document.getElementById('header-top-row');
        var toggle = document.getElementById('header-menu-toggle');
        if (!row || !toggle) return;
        var isOpen = row.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }

    function navigate(tab) {
        var current = window.location.hash.replace('#', '') || 'home';
        closeHeaderMenu();
        if (current === tab) {
            scrollPageToTop();
            return;
        }
        window.location.hash = tab;
    }

    function updateNavHighlight() {
        var hash = window.location.hash.replace('#', '') || 'home';
        var links = document.querySelectorAll('#bnl-nav a');
        links.forEach(function(a) {
            var aTab = a.getAttribute('href').replace('#', '');
            if (aTab === hash) {
                a.classList.add('nav-active');
            } else {
                a.classList.remove('nav-active');
            }
        });
    }

    window.addEventListener('hashchange', function() {
        scrollPageToTop();
        updateNavHighlight();
    });
    window.addEventListener('resize', function() {
        if (window.innerWidth > 1170) closeHeaderMenu();
    });
    updateNavHighlight();

    // ── Language switcher ─────────────────────────────────────────────────
    function switchLang(lang) {
        if (typeof setLang === 'function') setLang(lang);
        document.getElementById('lang-ru').className = lang === 'ru' ? 'active' : '';
        document.getElementById('lang-en').className = lang === 'en' ? 'active' : '';
        updateNavText(lang);
    }

    // Apply stored language on page load
    (function() {
        var storedLang = localStorage.getItem('bnl_lang') || 'ru';
        updateNavText(storedLang);
        document.getElementById('lang-ru').className = storedLang === 'ru' ? 'active' : '';
        document.getElementById('lang-en').className = storedLang === 'en' ? 'active' : '';
    })();

    window.addEventListener('storage', function(e) {
        if (!e.key || e.key === PLAYER_SESSION_KEY || e.key === PLAYER_USERNAME_KEY) updateHeaderProfileLink();
    });
    window.addEventListener(PLAYER_SESSION_EVENT, updateHeaderProfileLink);
    updateHeaderProfileLink();

    function setSeasonProgress(finished, total) {
        var countEl = document.getElementById('player-count');
        if (countEl) countEl.textContent = finished + '/' + total;

        var pct = total > 0 ? Math.min(finished / total * 100, 100) : 0;
        var bar = document.getElementById('progress-bar-fill');
        if (bar) bar.style.width = pct + '%';
    }

    function loadSeasonProgress() {
        fetch('/api/clan-wars/progress')
            .then(function(r) {
                if (!r.ok) throw new Error('Failed to load season progress');
                return r.json();
            })
            .then(function(data) {
                var finished = Number(data && data.finished) || 0;
                var total = Number(data && data.total) || 0;
                setSeasonProgress(finished, total);
            })
            .catch(function() {
                setSeasonProgress(0, 0);
            });
    }
    loadSeasonProgress();
</script>

</body>
</html>
